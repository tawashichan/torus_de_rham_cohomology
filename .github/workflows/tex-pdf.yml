name: Build TeX PDF

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    env:
      TEX_FILE: main.tex
      PDF_FILE: main.pdf

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y latexmk texlive-lang-japanese texlive-latex-extra

      - name: Build PDF
        run: bash ./build_pdf.sh "${TEX_FILE}"

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: main-pdf
          path: ${{ env.PDF_FILE }}
          if-no-files-found: error
